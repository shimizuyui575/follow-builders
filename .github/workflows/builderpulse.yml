name: BuilderPulse 每日推送

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  push-to-telegram:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch and send latest Chinese report
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.BUILDERPULSE_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: '8539455850'
        run: |
          TODAY=$(date -u '+%Y-%m-%d')
          YEAR=$(date -u '+%Y')

          URL="https://raw.githubusercontent.com/BuilderPulse/BuilderPulse/main/zh/${YEAR}/${TODAY}.md"
          CONTENT=$(curl -sf "$URL" || true)

          if [ -z "$CONTENT" ]; then
            echo "今日报告还未发布，跳过"
            exit 0
          fi

          SUMMARY=$(echo "$CONTENT" | head -c 3000)
          LINK="https://github.com/BuilderPulse/BuilderPulse/blob/main/zh/${YEAR}/${TODAY}.md"

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{
              \"chat_id\": \"${TELEGRAM_CHAT_ID}\",
              \"text\": $(echo "${SUMMARY}\n\n📖 完整报告: ${LINK}" | python3 -c 'import json,sys; print(json.dumps(sys.stdin.read()))'),
              \"disable_web_page_preview\": true
            }"

          echo "推送完成"
