name: BuilderPulse Daily Push

on:
  schedule:
    - cron: '0 */2 * * *'  # 每2小时检查一次
  workflow_dispatch:

jobs:
  push-to-telegram:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch and send latest Chinese report
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.BUILDERPULSE_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: '8539455850'
        run: |
          # 获取今天的日期
          TODAY=$(date -u '+%Y-%m-%d')
          YEAR=$(date -u '+%Y')
          
          # 尝试抓取今天的中文报告
          URL="https://raw.githubusercontent.com/BuilderPulse/BuilderPulse/main/zh/${YEAR}/${TODAY}.md"
          CONTENT=$(curl -sf "$URL" || echo "")
          
          if [ -z "$CONTENT" ]; then
            echo "今日报告还未发布，跳过"
            exit 0
          fi
          
          # 检查是否已发送过（用第一行作为标记）
          FIRST_LINE=$(echo "$CONTENT" | head -1)
          CACHE_FILE="/tmp/last_sent.txt"
          
          if [ -f "$CACHE_FILE" ] && grep -qF "$FIRST_LINE" "$CACHE_FILE"; then
            echo "今日已推送，跳过"
            exit 0
          fi
          
          # 截取前3000字符（Telegram限制4096）
          MESSAGE=$(echo "$CONTENT" | head -c 3000)
          MESSAGE="${MESSAGE}

📖 [查看完整报告](https://github.com/BuilderPulse/BuilderPulse/blob/main/zh/${YEAR}/${TODAY}.md)"

          # 发送到 Telegram
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="$MESSAGE" \
            -d parse_mode="Markdown" \
            -d disable_web_page_preview="false"
          
          echo "$FIRST_LINE" > "$CACHE_FILE"
          echo "推送成功"
