name: BuilderPulse Daily Push

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  push-to-telegram:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch and send latest Chinese report
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.BUILDERPULSE_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: '8539455850'
        run: |
          TODAY=$(date -u '+%Y-%m-%d')
          YEAR=$(date -u '+%Y')

          URL="https://raw.githubusercontent.com/BuilderPulse/BuilderPulse/main/zh/${YEAR}/${TODAY}.md"
          CONTENT=$(curl -sf "$URL" || echo "")

          if [ -z "$CONTENT" ]; then
            echo "今日报告还未发布，跳过"
            exit 0
          fi

          # 取前3500字符，避免超过Telegram 4096字符限制
          MESSAGE=$(echo "$CONTENT" | head -c 3500)
          MESSAGE="${MESSAGE}

---
📖 [查看完整报告](https://github.com/BuilderPulse/BuilderPulse/blob/main/zh/${YEAR}/${TODAY}.md)"

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            --data-urlencode text="${MESSAGE}" \
            -d parse_mode="Markdown" \
            -d disable_web_page_preview="true"

          echo "推送完成"
